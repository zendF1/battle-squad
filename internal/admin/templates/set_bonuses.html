{{define "content"}}
<div class="top-bar">
    <h1>Set Bonuses</h1>
</div>
{{if .Flash}}<div class="flash flash-success">{{.Flash}}</div>{{end}}
{{if .Error}}<div class="flash flash-error">{{.Error}}</div>{{end}}

<div class="card">
<p style="margin-bottom:16px;font-size:14px;color:#666;">Equipping multiple items of the same tier activates set bonuses (percentage boosts).</p>
<table>
<thead>
<tr>
    <th>Tier</th>
    <th>Pieces Required</th>
    <th>HP %</th>
    <th>DMG %</th>
    <th>DEF %</th>
    <th>Crit %</th>
    <th>Action</th>
</tr>
</thead>
<tbody>
{{range .Bonuses}}
<tr>
<form method="POST" action="/set-bonuses/save">
    <td><input type="text" name="tier" value="{{index . "Tier"}}" style="width:100px"></td>
    <td><input type="number" name="pieces_required" value="{{index . "Pieces"}}" min="1" style="width:80px"></td>
    <td><input type="number" name="bonus_hp_pct" value="{{index . "HP"}}" step="0.01" style="width:80px"></td>
    <td><input type="number" name="bonus_dmg_pct" value="{{index . "DMG"}}" step="0.01" style="width:80px"></td>
    <td><input type="number" name="bonus_def_pct" value="{{index . "DEF"}}" step="0.01" style="width:80px"></td>
    <td><input type="number" name="bonus_crit_pct" value="{{index . "Crit"}}" step="0.01" style="width:80px"></td>
    <td><button type="submit" class="btn btn-success btn-sm">Save</button></td>
</form>
</tr>
{{end}}
<tr>
<form method="POST" action="/set-bonuses/save">
    <td><input type="text" name="tier" placeholder="e.g. rare" style="width:100px"></td>
    <td><input type="number" name="pieces_required" placeholder="2" min="1" style="width:80px"></td>
    <td><input type="number" name="bonus_hp_pct" placeholder="0.00" step="0.01" style="width:80px"></td>
    <td><input type="number" name="bonus_dmg_pct" placeholder="0.00" step="0.01" style="width:80px"></td>
    <td><input type="number" name="bonus_def_pct" placeholder="0.00" step="0.01" style="width:80px"></td>
    <td><input type="number" name="bonus_crit_pct" placeholder="0.00" step="0.01" style="width:80px"></td>
    <td><button type="submit" class="btn btn-primary btn-sm">Add</button></td>
</form>
</tr>
</tbody>
</table>
</div>
{{end}}
