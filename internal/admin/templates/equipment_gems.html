{{define "content"}}
<div class="top-bar">
    <h1>Gem Config</h1>
</div>
{{if .Flash}}<div class="flash flash-success">{{.Flash}}</div>{{end}}
{{if .Error}}<div class="flash flash-error">{{.Error}}</div>{{end}}

<div class="card">
<p style="margin-bottom:16px;font-size:14px;color:#666;">Gems are socketed into equipment slots to add stats. Each gem type has levels 1–10.</p>
<table>
<thead>
<tr>
    <th>Gem Type</th>
    <th>Level</th>
    <th>Stat Value</th>
    <th>Action</th>
</tr>
</thead>
<tbody>
{{range .Gems}}
<tr>
<form method="POST" action="/equipment-gems/save">
    <td><input type="text" name="gem_type" value="{{index . "GemType"}}" style="width:120px"></td>
    <td><input type="number" name="gem_level" value="{{index . "GemLevel"}}" min="1" max="10" style="width:80px"></td>
    <td><input type="number" name="stat_value" value="{{index . "StatValue"}}" step="0.01" style="width:100px"></td>
    <td><button type="submit" class="btn btn-success btn-sm">Save</button></td>
</form>
</tr>
{{end}}
<tr>
<form method="POST" action="/equipment-gems/save">
    <td><input type="text" name="gem_type" placeholder="e.g. hp" style="width:120px"></td>
    <td><input type="number" name="gem_level" placeholder="1–10" min="1" max="10" style="width:80px"></td>
    <td><input type="number" name="stat_value" placeholder="value" step="0.01" style="width:100px"></td>
    <td><button type="submit" class="btn btn-primary btn-sm">Add</button></td>
</form>
</tr>
</tbody>
</table>
</div>
{{end}}
