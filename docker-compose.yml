version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: battlesquad_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: battlesquad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - battlesquad_network

  redis:
    image: redis:7-alpine
    container_name: battlesquad_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - battlesquad_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/battlesquad?sslmode=disable
      - REDIS_ADDR=redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - battlesquad_network

  game1:
    build:
      context: .
      dockerfile: Dockerfile.game
    environment:
      - POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/battlesquad?sslmode=disable
      - REDIS_ADDR=redis:6379
      - NODE_ID=game-1
    depends_on:
      - postgres
      - redis
    networks:
      - battlesquad_network

  game2:
    build:
      context: .
      dockerfile: Dockerfile.game
    environment:
      - POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/battlesquad?sslmode=disable
      - REDIS_ADDR=redis:6379
      - NODE_ID=game-2
    depends_on:
      - postgres
      - redis
    networks:
      - battlesquad_network

  nginx:
    image: nginx:alpine
    ports:
      - "8081:8081"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - game1
      - game2
    networks:
      - battlesquad_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/battlesquad?sslmode=disable
      - REDIS_ADDR=redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - battlesquad_network

volumes:
  postgres_data:
  redis_data:

networks:
  battlesquad_network:
    driver: bridge
