version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: battlesquad_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: battlesquad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - battlesquad_network

  redis:
    image: redis:7-alpine
    container_name: battlesquad_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - battlesquad_network

volumes:
  postgres_data:
  redis_data:

networks:
  battlesquad_network:
    driver: bridge
