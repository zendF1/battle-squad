<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Squad — Database ERD</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }

  .topbar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 20px; z-index: 100; gap: 16px; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: #f8fafc; }
  .topbar .hint { font-size: 12px; color: #94a3b8; }
  .topbar .zoom-controls { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .topbar button { background: #334155; border: 1px solid #475569; color: #e2e8f0; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .topbar button:hover { background: #475569; }
  .topbar .zoom-level { font-size: 12px; color: #94a3b8; min-width: 40px; text-align: center; }

  .legend { position: fixed; bottom: 16px; left: 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; z-index: 100; font-size: 12px; }
  .legend-title { font-weight: 600; margin-bottom: 8px; color: #cbd5e1; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .legend-color { width: 14px; height: 14px; border-radius: 3px; }

  #canvas { position: absolute; top: 48px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
  #canvas.dragging { cursor: grabbing; }
  #world { position: absolute; transform-origin: 0 0; }

  .domain-group { position: absolute; border-radius: 12px; padding: 16px; }
  .domain-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; padding: 4px 10px; border-radius: 4px; display: inline-block; }
  .domain-tables { display: flex; flex-wrap: wrap; gap: 10px; }

  .table-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; width: 280px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); flex-shrink: 0; }
  .table-card:hover { border-color: #60a5fa; box-shadow: 0 2px 12px rgba(96,165,250,0.2); }
  .table-name { padding: 8px 12px; font-weight: 700; font-size: 13px; border-bottom: 1px solid #334155; border-radius: 8px 8px 0 0; }
  .table-cols { padding: 6px 0; }
  .col-row { display: flex; padding: 2px 12px; font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; gap: 8px; align-items: center; }
  .col-row:hover { background: #334155; }
  .col-badge { font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; flex-shrink: 0; }
  .col-badge.pk { background: #f59e0b; color: #000; }
  .col-badge.fk { background: #3b82f6; color: #fff; }
  .col-badge.uk { background: #8b5cf6; color: #fff; }
  .col-type { color: #94a3b8; min-width: 65px; flex-shrink: 0; }
  .col-name { color: #e2e8f0; flex: 1; }
  .col-comment { color: #64748b; font-size: 11px; font-style: italic; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Relationship lines */
  #rel-svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
  .rel-path { stroke: #475569; stroke-width: 1.5; fill: none; opacity: 0.5; }

  /* Domain colors */
  .domain-auth { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.25); }
  .domain-auth .domain-label { background: #1e40af; color: #93c5fd; }
  .domain-auth .table-name { background: rgba(59,130,246,0.1); color: #93c5fd; }

  .domain-inventory { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); }
  .domain-inventory .domain-label { background: #065f46; color: #6ee7b7; }
  .domain-inventory .table-name { background: rgba(16,185,129,0.1); color: #6ee7b7; }

  .domain-shop { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); }
  .domain-shop .domain-label { background: #78350f; color: #fcd34d; }
  .domain-shop .table-name { background: rgba(245,158,11,0.1); color: #fcd34d; }

  .domain-gift { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.25); }
  .domain-gift .domain-label { background: #581c87; color: #c4b5fd; }
  .domain-gift .table-name { background: rgba(168,85,247,0.1); color: #c4b5fd; }

  .domain-mission { background: rgba(236,72,153,0.08); border: 1px solid rgba(236,72,153,0.25); }
  .domain-mission .domain-label { background: #831843; color: #f9a8d4; }
  .domain-mission .table-name { background: rgba(236,72,153,0.1); color: #f9a8d4; }

  .domain-ranking { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); }
  .domain-ranking .domain-label { background: #7f1d1d; color: #fca5a5; }
  .domain-ranking .table-name { background: rgba(239,68,68,0.1); color: #fca5a5; }

  .domain-match { background: rgba(14,165,233,0.08); border: 1px solid rgba(14,165,233,0.25); }
  .domain-match .domain-label { background: #0c4a6e; color: #7dd3fc; }
  .domain-match .table-name { background: rgba(14,165,233,0.1); color: #7dd3fc; }

  .domain-moderation { background: rgba(251,146,60,0.08); border: 1px solid rgba(251,146,60,0.25); }
  .domain-moderation .domain-label { background: #7c2d12; color: #fdba74; }
  .domain-moderation .table-name { background: rgba(251,146,60,0.1); color: #fdba74; }

  .domain-config { background: rgba(148,163,184,0.08); border: 1px solid rgba(148,163,184,0.25); }
  .domain-config .domain-label { background: #334155; color: #cbd5e1; }
  .domain-config .table-name { background: rgba(148,163,184,0.1); color: #cbd5e1; }

  .domain-gameconfig { background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.25); }
  .domain-gameconfig .domain-label { background: #164e63; color: #67e8f9; }
  .domain-gameconfig .table-name { background: rgba(34,211,238,0.1); color: #67e8f9; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Battle Squad — Database ERD</h1>
  <span class="hint">Scroll to zoom · Drag to pan · 30 tables · 10 domains</span>
  <div class="zoom-controls">
    <button onclick="zoomIn()">+</button>
    <span class="zoom-level" id="zoomLabel">100%</span>
    <button onclick="zoomOut()">−</button>
    <button onclick="resetView()">Reset</button>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Domain Groups</div>
  <div class="legend-item"><div class="legend-color" style="background:#3b82f6"></div> Auth & Player</div>
  <div class="legend-item"><div class="legend-color" style="background:#10b981"></div> Inventory & Economy</div>
  <div class="legend-item"><div class="legend-color" style="background:#f59e0b"></div> Shop & IAP</div>
  <div class="legend-item"><div class="legend-color" style="background:#a855f7"></div> Gift Codes</div>
  <div class="legend-item"><div class="legend-color" style="background:#ec4899"></div> Missions</div>
  <div class="legend-item"><div class="legend-color" style="background:#ef4444"></div> Ranking</div>
  <div class="legend-item"><div class="legend-color" style="background:#0ea5e9"></div> Match</div>
  <div class="legend-item"><div class="legend-color" style="background:#fb923c"></div> Moderation</div>
  <div class="legend-item"><div class="legend-color" style="background:#94a3b8"></div> App Config</div>
  <div class="legend-item"><div class="legend-color" style="background:#22d3ee"></div> Game Config</div>
</div>

<div id="canvas">
  <div id="world">
    <svg id="rel-svg"></svg>
  </div>
</div>

<script>
const schema = [
  // Row 0: Auth (wide) + Shop
  { id:'auth', label:'Auth & Player', cls:'domain-auth', gridCol:0, gridRow:0, gridW:1, tables:[
    { name:'accounts', cols:[
      {n:'account_id',t:'VARCHAR',pk:1},{n:'account_type',t:'VARCHAR',c:'guest, google, apple'},{n:'status',t:'VARCHAR',c:'active, banned, deleted'},{n:'primary_player_id',t:'VARCHAR',fk:1},{n:'role',t:'VARCHAR',c:'player, admin'},{n:'created_at',t:'TIMESTAMP'},{n:'last_login_at',t:'TIMESTAMP'},{n:'deleted_at',t:'TIMESTAMP'}
    ]},
    { name:'auth_identities', cols:[
      {n:'identity_id',t:'VARCHAR',pk:1},{n:'account_id',t:'VARCHAR',fk:1},{n:'provider',t:'VARCHAR',c:'guest, google, apple'},{n:'provider_user_id',t:'VARCHAR',uk:1},{n:'email_hash',t:'VARCHAR'},{n:'created_at',t:'TIMESTAMP'}
    ]},
    { name:'player_profiles', cols:[
      {n:'player_id',t:'VARCHAR',pk:1},{n:'account_id',t:'VARCHAR',fk:1},{n:'display_name',t:'VARCHAR'},{n:'level',t:'INT'},{n:'exp',t:'INT'},{n:'coin',t:'INT'},{n:'gem',t:'INT'},{n:'created_at',t:'TIMESTAMP'}
    ]},
  ]},
  { id:'shop', label:'Shop & IAP', cls:'domain-shop', gridCol:1, gridRow:0, gridW:1, tables:[
    { name:'shop_offers', cols:[
      {n:'offer_id',t:'VARCHAR',pk:1},{n:'item_id',t:'VARCHAR'},{n:'offer_type',t:'VARCHAR',c:'item, character_unlock'},{n:'price_currency',t:'VARCHAR',c:'coin, gem'},{n:'price_amount',t:'INT'},{n:'is_active',t:'BOOLEAN'}
    ]},
    { name:'shop_purchases', cols:[
      {n:'purchase_id',t:'VARCHAR',pk:1},{n:'player_id',t:'VARCHAR',fk:1},{n:'offer_id',t:'VARCHAR',fk:1},{n:'price_amount',t:'INT'},{n:'status',t:'VARCHAR',c:'completed, failed'}
    ]},
    { name:'iap_products', cols:[
      {n:'product_id',t:'VARCHAR',pk:1},{n:'platform_sku_id',t:'JSONB'},{n:'gem_amount',t:'INT'},{n:'price_usd',t:'NUMERIC'},{n:'is_active',t:'BOOLEAN'}
    ]},
    { name:'payment_transactions', cols:[
      {n:'transaction_id',t:'VARCHAR',pk:1},{n:'player_id',t:'VARCHAR',fk:1},{n:'product_id',t:'VARCHAR',fk:1},{n:'platform',t:'VARCHAR',c:'android, ios'},{n:'gem_granted',t:'INT'},{n:'status',t:'VARCHAR',c:'pending, verified'}
    ]},
  ]},
  { id:'gift', label:'Gift Codes', cls:'domain-gift', gridCol:2, gridRow:0, gridW:1, tables:[
    { name:'gift_codes', cols:[
      {n:'code',t:'VARCHAR',pk:1},{n:'reward_coin',t:'INT'},{n:'reward_gem',t:'INT'},{n:'reward_items',t:'JSONB'},{n:'max_uses',t:'INT'},{n:'is_active',t:'BOOLEAN'}
    ]},
    { name:'gift_code_redemptions', cols:[
      {n:'player_id',t:'VARCHAR',pk:1,fk:1},{n:'code',t:'VARCHAR',pk:1,fk:1},{n:'redeemed_at',t:'TIMESTAMP'}
    ]},
  ]},

  // Row 1: Inventory + Ranking + Missions
  { id:'inventory', label:'Inventory & Economy', cls:'domain-inventory', gridCol:0, gridRow:1, gridW:1, tables:[
    { name:'player_characters', cols:[
      {n:'player_id',t:'VARCHAR',pk:1,fk:1},{n:'character_id',t:'VARCHAR',pk:1},{n:'level',t:'INT'},{n:'exp',t:'INT'},{n:'stat_points',t:'INT'},{n:'bonus_hp',t:'INT'},{n:'bonus_damage',t:'INT'},{n:'bonus_mobility',t:'INT'},{n:'bonus_defense',t:'INT'},{n:'bonus_skill_power',t:'INT'},{n:'bonus_terrain_damage',t:'INT'},{n:'unlocked_at',t:'TIMESTAMP'}
    ]},
    { name:'inventory_items', cols:[
      {n:'player_id',t:'VARCHAR',pk:1,fk:1},{n:'item_id',t:'VARCHAR',pk:1},{n:'quantity',t:'INT'},{n:'source',t:'VARCHAR'},{n:'expires_at',t:'TIMESTAMP'}
    ]},
    { name:'inventory_reservations', cols:[
      {n:'reservation_id',t:'VARCHAR',pk:1},{n:'player_id',t:'VARCHAR',fk:1},{n:'match_id',t:'VARCHAR'},{n:'item_id',t:'VARCHAR'},{n:'quantity',t:'INT'},{n:'status',t:'VARCHAR',c:'reserved, consumed, released'}
    ]},
    { name:'economy_transactions', cols:[
      {n:'transaction_id',t:'VARCHAR',pk:1},{n:'player_id',t:'VARCHAR',fk:1},{n:'currency',t:'VARCHAR',c:'coin, gem'},{n:'amount',t:'INT'},{n:'balance_after',t:'INT'},{n:'source',t:'VARCHAR',c:'match_reward, iap, ...'}
    ]},
    { name:'player_loadouts', cols:[
      {n:'player_id',t:'VARCHAR',pk:1,fk:1},{n:'character_id',t:'VARCHAR',c:'default: rookie'},{n:'items',t:'JSONB',c:'max 3 items'},{n:'updated_at',t:'TIMESTAMP'}
    ]},
  ]},
  { id:'ranking', label:'Ranking', cls:'domain-ranking', gridCol:1, gridRow:1, gridW:1, tables:[
    { name:'rank_seasons', cols:[
      {n:'season_id',t:'VARCHAR',pk:1},{n:'name',t:'VARCHAR'},{n:'starts_at',t:'TIMESTAMP'},{n:'ends_at',t:'TIMESTAMP'},{n:'status',t:'VARCHAR',c:'upcoming, active, ended'}
    ]},
    { name:'player_ranks', cols:[
      {n:'player_id',t:'VARCHAR',pk:1,fk:1},{n:'season_id',t:'VARCHAR',pk:1,fk:1},{n:'rating',t:'INT',c:'default: 1000'},{n:'tier',t:'VARCHAR',c:'bronze ~ master'},{n:'division',t:'INT',c:'1-3'},{n:'wins',t:'INT'},{n:'losses',t:'INT'},{n:'win_streak',t:'INT'}
    ]},
    { name:'season_reward_claims', cols:[
      {n:'claim_id',t:'VARCHAR',pk:1},{n:'player_id',t:'VARCHAR',fk:1},{n:'season_id',t:'VARCHAR',fk:1},{n:'tier',t:'VARCHAR'},{n:'reward_coin',t:'INT'},{n:'reward_gem',t:'INT'}
    ]},
  ]},
  { id:'mission', label:'Missions', cls:'domain-mission', gridCol:2, gridRow:1, gridW:1, tables:[
    { name:'missions', cols:[
      {n:'mission_id',t:'VARCHAR',pk:1},{n:'type',t:'VARCHAR',c:'daily, achievement'},{n:'target',t:'VARCHAR',c:'play_match, win_match'},{n:'required_value',t:'INT'},{n:'reward_coin',t:'INT'},{n:'is_active',t:'BOOLEAN'}
    ]},
    { name:'mission_progress', cols:[
      {n:'player_id',t:'VARCHAR',pk:1,fk:1},{n:'mission_id',t:'VARCHAR',pk:1,fk:1},{n:'current_value',t:'INT'},{n:'is_claimed',t:'BOOLEAN'}
    ]},
  ]},

  // Row 2: Moderation + Match + Config
  { id:'moderation', label:'Moderation', cls:'domain-moderation', gridCol:0, gridRow:2, gridW:1, tables:[
    { name:'player_reports', cols:[
      {n:'report_id',t:'VARCHAR',pk:1},{n:'reporter_player_id',t:'VARCHAR',fk:1},{n:'target_player_id',t:'VARCHAR',fk:1},{n:'match_id',t:'VARCHAR'},{n:'category',t:'VARCHAR',c:'cheat, abuse, afk'},{n:'status',t:'VARCHAR',c:'open, reviewing'}
    ]},
    { name:'account_bans', cols:[
      {n:'ban_id',t:'VARCHAR',pk:1},{n:'account_id',t:'VARCHAR',fk:1},{n:'player_id',t:'VARCHAR',fk:1},{n:'reason_code',t:'VARCHAR'},{n:'source',t:'VARCHAR',c:'anti_cheat, moderator'},{n:'ends_at',t:'TIMESTAMP',c:'NULL = permanent'},{n:'status',t:'VARCHAR',c:'active, expired, revoked'}
    ]},
  ]},
  { id:'match', label:'Match', cls:'domain-match', gridCol:1, gridRow:2, gridW:1, tables:[
    { name:'match_histories', cols:[
      {n:'match_id',t:'VARCHAR',pk:1},{n:'player_id',t:'VARCHAR',pk:1,fk:1},{n:'mode',t:'VARCHAR',c:'pvp_1v1, ranked_2v2'},{n:'map_id',t:'VARCHAR'},{n:'result',t:'VARCHAR',c:'win, loss, draw'},{n:'damage',t:'INT'},{n:'kills',t:'INT'},{n:'exp_gained',t:'INT'}
    ]},
    { name:'match_snapshots', cols:[
      {n:'match_id',t:'VARCHAR',pk:1},{n:'room_id',t:'VARCHAR'},{n:'server_node_id',t:'VARCHAR'},{n:'state_blob',t:'JSONB'},{n:'terrain_blob',t:'BYTEA'},{n:'checksum',t:'VARCHAR'}
    ]},
    { name:'match_recovery_logs', cols:[
      {n:'log_id',t:'VARCHAR',pk:1},{n:'match_id',t:'VARCHAR'},{n:'event_seq',t:'INT',uk:1},{n:'event_type',t:'VARCHAR'},{n:'event_payload',t:'JSONB'}
    ]},
    { name:'match_event_logs', cols:[
      {n:'id',t:'BIGINT',pk:1},{n:'match_id',t:'TEXT'},{n:'seq',t:'BIGINT'},{n:'event_type',t:'TEXT'},{n:'player_id',t:'TEXT'},{n:'data',t:'JSONB'}
    ]},
  ]},
  { id:'config', label:'App Config', cls:'domain-config', gridCol:2, gridRow:2, gridW:1, tables:[
    { name:'client_version_policies', cols:[
      {n:'platform',t:'VARCHAR',pk:1,c:'android, ios'},{n:'min_supported_version',t:'VARCHAR'},{n:'latest_version',t:'VARCHAR'},{n:'protocol_version',t:'INT'},{n:'force_update',t:'BOOLEAN'}
    ]},
    { name:'game_settings', cols:[
      {n:'key',t:'TEXT',pk:1},{n:'value',t:'TEXT'},{n:'value_type',t:'TEXT',c:'number, json, string'},{n:'category',t:'TEXT',c:'general, matchmaking'}
    ]},
  ]},

  // Row 3: Game Config (wide)
  { id:'gameconfig', label:'Game Config (Admin)', cls:'domain-gameconfig', gridCol:0, gridRow:3, gridW:3, tables:[
    { name:'config_characters', cols:[
      {n:'character_id',t:'TEXT',pk:1},{n:'name',t:'TEXT'},{n:'role',t:'TEXT'},{n:'hp',t:'INT'},{n:'damage',t:'INT'},{n:'defense',t:'INT'},{n:'weapon_id',t:'TEXT'},{n:'skill_id',t:'TEXT'}
    ]},
    { name:'config_weapons', cols:[
      {n:'weapon_id',t:'TEXT',pk:1},{n:'name',t:'TEXT'},{n:'damage',t:'INT'},{n:'explosion_radius',t:'INT'},{n:'wind_influence',t:'FLOAT'}
    ]},
    { name:'config_skills', cols:[
      {n:'skill_id',t:'TEXT',pk:1},{n:'character_id',t:'TEXT'},{n:'name',t:'TEXT'},{n:'cooldown_turn',t:'INT'},{n:'effect_type',t:'TEXT'}
    ]},
    { name:'config_items', cols:[
      {n:'item_id',t:'TEXT',pk:1},{n:'name',t:'TEXT'},{n:'type',t:'TEXT'},{n:'value',t:'FLOAT'}
    ]},
    { name:'config_maps', cols:[
      {n:'map_id',t:'TEXT',pk:1},{n:'name',t:'TEXT'},{n:'width',t:'INT'},{n:'height',t:'INT'},{n:'spawn_points',t:'JSONB'}
    ]},
  ]},
];

// Relationships: [fromTable, toTable]
const relationships = [
  ['accounts','auth_identities'],
  ['accounts','player_profiles'],
  ['player_profiles','player_characters'],
  ['player_profiles','inventory_items'],
  ['player_profiles','inventory_reservations'],
  ['player_profiles','economy_transactions'],
  ['player_profiles','player_loadouts'],
  ['player_profiles','shop_purchases'],
  ['shop_offers','shop_purchases'],
  ['player_profiles','payment_transactions'],
  ['iap_products','payment_transactions'],
  ['player_profiles','gift_code_redemptions'],
  ['gift_codes','gift_code_redemptions'],
  ['player_profiles','mission_progress'],
  ['missions','mission_progress'],
  ['player_profiles','player_ranks'],
  ['rank_seasons','player_ranks'],
  ['player_profiles','season_reward_claims'],
  ['rank_seasons','season_reward_claims'],
  ['player_profiles','match_histories'],
  ['player_profiles','player_reports'],
  ['accounts','account_bans'],
  ['player_profiles','account_bans'],
];

// ── Layout constants ──
const COL_W = 620;
const ROW_GAP = 30;
const COL_GAP = 30;
const ORIGIN_X = 30;
const ORIGIN_Y = 30;

// ── Render ──
const world = document.getElementById('world');

function renderCol(c) {
  let badges = '';
  if (c.pk) badges += '<span class="col-badge pk">PK</span>';
  if (c.fk) badges += '<span class="col-badge fk">FK</span>';
  if (c.uk) badges += '<span class="col-badge uk">UK</span>';
  const comment = c.c ? `<span class="col-comment" title="${c.c}">${c.c}</span>` : '';
  return `<div class="col-row">${badges}<span class="col-type">${c.t}</span><span class="col-name">${c.n}</span>${comment}</div>`;
}

function renderTable(t) {
  return `<div class="table-card" id="tbl-${t.name}"><div class="table-name">${t.name}</div><div class="table-cols">${t.cols.map(renderCol).join('')}</div></div>`;
}

// First pass: render all domains to measure heights
const domainEls = [];
schema.forEach(d => {
  const div = document.createElement('div');
  div.className = `domain-group ${d.cls}`;
  div.id = `domain-${d.id}`;
  const widthCols = d.gridW || 1;
  const w = widthCols * COL_W + (widthCols - 1) * COL_GAP;
  div.style.width = w + 'px';
  div.innerHTML = `<div class="domain-label">${d.label}</div><div class="domain-tables">${d.tables.map(renderTable).join('')}</div>`;
  world.appendChild(div);
  domainEls.push({ el: div, data: d });
});

// Second pass: measure actual heights, compute row heights, position absolutely
requestAnimationFrame(() => {
  // Collect max height per grid row
  const rowMaxH = {};
  domainEls.forEach(({el, data}) => {
    const r = data.gridRow;
    const h = el.offsetHeight;
    if (!rowMaxH[r] || h > rowMaxH[r]) rowMaxH[r] = h;
  });

  // Compute row Y positions
  const rowY = {};
  let cumY = ORIGIN_Y;
  const maxRow = Math.max(...Object.keys(rowMaxH).map(Number));
  for (let r = 0; r <= maxRow; r++) {
    rowY[r] = cumY;
    cumY += (rowMaxH[r] || 0) + ROW_GAP;
  }

  // Position each domain
  domainEls.forEach(({el, data}) => {
    const x = ORIGIN_X + data.gridCol * (COL_W + COL_GAP);
    const y = rowY[data.gridRow];
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  });

  // Draw relationship lines
  drawRelationships();
});

// Get element position relative to #world using offsetLeft/offsetTop chain
function getWorldRect(el) {
  let x = 0, y = 0, cur = el;
  while (cur && cur !== world) {
    x += cur.offsetLeft;
    y += cur.offsetTop;
    cur = cur.offsetParent;
  }
  return { x, y, w: el.offsetWidth, h: el.offsetHeight };
}

function drawRelationships() {
  const svg = document.getElementById('rel-svg');
  svg.setAttribute('width', '5000');
  svg.setAttribute('height', '5000');
  svg.innerHTML = '';

  relationships.forEach(([from, to]) => {
    const fromEl = document.getElementById('tbl-' + from);
    const toEl = document.getElementById('tbl-' + to);
    if (!fromEl || !toEl) return;

    const f = getWorldRect(fromEl);
    const t = getWorldRect(toEl);

    const fcx = f.x + f.w / 2, fcy = f.y + f.h / 2;
    const tcx = t.x + t.w / 2, tcy = t.y + t.h / 2;

    // Pick edge exit/entry points
    let x1, y1, x2, y2;
    if (Math.abs(fcx - tcx) > Math.abs(fcy - tcy)) {
      // Horizontal dominant — exit from left/right edge
      if (fcx < tcx) {
        x1 = f.x + f.w; y1 = fcy;
        x2 = t.x;       y2 = tcy;
      } else {
        x1 = f.x;       y1 = fcy;
        x2 = t.x + t.w; y2 = tcy;
      }
    } else {
      // Vertical dominant — exit from top/bottom edge
      if (fcy < tcy) {
        x1 = fcx; y1 = f.y + f.h;
        x2 = tcx; y2 = t.y;
      } else {
        x1 = fcx; y1 = f.y;
        x2 = tcx; y2 = t.y + t.h;
      }
    }

    // Cubic bezier curve
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    let d;
    if (Math.abs(x2 - x1) > Math.abs(y2 - y1)) {
      const cx = Math.abs(x2 - x1) * 0.4;
      d = `M${x1},${y1} C${x1 + Math.sign(x2-x1)*cx},${y1} ${x2 - Math.sign(x2-x1)*cx},${y2} ${x2},${y2}`;
    } else {
      const cy = Math.abs(y2 - y1) * 0.4;
      d = `M${x1},${y1} C${x1},${y1 + Math.sign(y2-y1)*cy} ${x2},${y2 - Math.sign(y2-y1)*cy} ${x2},${y2}`;
    }
    path.setAttribute('d', d);
    path.setAttribute('class', 'rel-path');
    svg.appendChild(path);

    // Dot at target end
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x2);
    circle.setAttribute('cy', y2);
    circle.setAttribute('r', '4');
    circle.setAttribute('fill', '#60a5fa');
    circle.setAttribute('opacity', '0.6');
    svg.appendChild(circle);
  });
}

// ── Pan & Zoom ──
let scale = 0.7, panX = 20, panY = 10;
const canvas = document.getElementById('canvas');

function applyTransform() {
  world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
}
applyTransform();

let isDragging = false, startX, startY;
canvas.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY; canvas.classList.add('dragging'); });
window.addEventListener('mousemove', e => { if (!isDragging) return; panX = e.clientX - startX; panY = e.clientY - startY; applyTransform(); });
window.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('dragging'); });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldScale = scale;
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  scale = Math.max(0.15, Math.min(2.5, scale + delta));
  // Zoom toward cursor
  panX = mx - (mx - panX) * (scale / oldScale);
  panY = my - (my - panY) * (scale / oldScale);
  applyTransform();
}, { passive: false });

function zoomIn()  { scale = Math.min(2.5, scale + 0.1); applyTransform(); }
function zoomOut() { scale = Math.max(0.15, scale - 0.1); applyTransform(); }
function resetView() { scale = 0.7; panX = 20; panY = 10; applyTransform(); }
</script>
